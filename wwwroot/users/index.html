<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - User Accounts</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased">

    <div class="max-w-6xl mx-auto p-6">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">User Accounts</h1>
                <p class="text-sm text-slate-500 mt-1">Manage all employees registered in the ERP system</p>
            </div>
            <button onclick="window.location.href='create.html'" class="px-5 py-2.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-colors cursor-pointer">
                <i class="fa-solid fa-plus mr-1"></i> Add User
            </button>
        </div>

        <!-- Alert Message -->
        <div id="alertMessage" class="hidden mb-4 p-4 rounded-lg text-sm font-medium"></div>

        <!-- Table Card -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-900 text-white text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-3">Name</th>
                        <th class="px-6 py-3">Email</th>
                        <th class="px-6 py-3">Role</th>
                        <th class="px-6 py-3">Department</th>
                        <th class="px-6 py-3">Designation</th>
                        <th class="px-6 py-3">Status</th>
                        <th class="px-6 py-3 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6">
            <h2 class="text-lg font-semibold text-slate-900 mb-4">Edit User</h2>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Name</label>
                    <input type="text" id="editName" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Email</label>
                    <input type="email" id="editEmail" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Role ID</label>
                        <input type="number" id="editRoleId" required min="1" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Dept ID</label>
                        <input type="number" id="editDepartmentId" required min="1" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Desig ID</label>
                        <input type="number" id="editDesignationId" required min="1" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="editIsActive" class="h-4 w-4 text-indigo-600 border-slate-300 rounded cursor-pointer">
                    <label for="editIsActive" class="text-sm font-medium text-slate-600 cursor-pointer">Active Account</label>
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                    <button type="submit" class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            try {
                const response = await fetch(`${API_BASE_URL}/users`);
                if (!response.ok) throw new Error('Failed to fetch users');

                const users = await response.json();

                if (!Array.isArray(users) || users.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No users found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-3 font-medium text-slate-800">${escapeHtml(u.name)}</td>
                        <td class="px-6 py-3 text-slate-600">${escapeHtml(u.email)}</td>
                        <td class="px-6 py-3 text-slate-600">${escapeHtml(u.roleName)}</td>
                        <td class="px-6 py-3 text-slate-600">${escapeHtml(u.departmentName)}</td>
                        <td class="px-6 py-3 text-slate-600">${escapeHtml(u.designationName)}</td>
                        <td class="px-6 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${u.isActive ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">
                                ${u.isActive ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="px-6 py-3 text-right space-x-2">
                            <button onclick='openEditModal(${JSON.stringify(u)})' class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                                <i class="fa-solid fa-pen"></i> Edit
                            </button>
                            <button onclick="deleteUser(${u.id})" class="text-red-600 hover:text-red-800 text-sm font-medium">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-red-500">Error loading users: ${error.message}</td></tr>`;
            }
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openEditModal(user) {
            document.getElementById('editId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRoleId').value = user.roleId;
            document.getElementById('editDepartmentId').value = user.departmentId;
            document.getElementById('editDesignationId').value = user.designationId;
            document.getElementById('editIsActive').checked = user.isActive;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const payload = {
                name: document.getElementById('editName').value.trim(),
                email: document.getElementById('editEmail').value.trim(),
                roleId: parseInt(document.getElementById('editRoleId').value),
                departmentId: parseInt(document.getElementById('editDepartmentId').value),
                designationId: parseInt(document.getElementById('editDesignationId').value),
                isActive: document.getElementById('editIsActive').checked
            };

            try {
                const response = await fetch(`${API_BASE_URL}/users/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showAlert('User updated successfully.', 'success');
                    closeEditModal();
                    loadUsers();
                } else {
                    const errData = await response.json().catch(() => ({}));
                    showAlert(errData.message || 'Error updating user.', 'error');
                }
            } catch (error) {
                showAlert('Server unreachable. Please check API status.', 'error');
            }
        });

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user? This cannot be undone.')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/users/${id}`, { method: 'DELETE' });

                if (response.ok) {
                    showAlert('User deleted successfully.', 'success');
                    loadUsers();
                } else {
                    const errData = await response.json().catch(() => ({}));
                    showAlert(errData.message || 'Error deleting user.', 'error');
                }
            } catch (error) {
                showAlert('Server unreachable. Please check API status.', 'error');
            }
        }

        function showAlert(msg, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700');
            alertDiv.classList.add(type === 'success' ? 'bg-green-50' : 'bg-red-50', type === 'success' ? 'text-green-700' : 'text-red-700');
            alertDiv.textContent = msg;
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
