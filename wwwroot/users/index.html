<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - User Accounts</title>

    <script>window.ALLOWED_ROLES = ["Admin", "User"];</script>
    <script src="/auth-guard.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

            .card-hover:hover {
                transform: translateY(-3px);
                box-shadow: 0 12px 28px rgba(0,0,0,0.10);
            }

        .avatar-ring {
            box-shadow: 0 0 0 4px #e0e7ff, 0 0 0 6px #c7d2fe;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen">

   
    <div class="bg-slate-900 px-8 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 rounded-lg w-8 h-8 flex items-center justify-center">
                <i class="fa-solid fa-building text-white text-sm"></i>
            </div>
            <span class="text-white font-semibold text-lg tracking-tight">ERP System</span>
        </div>

        <div class="flex items-center space-x-3">
            <button onclick="window.location.href='create.html'"
                    class="flex items-center space-x-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors shadow">
                <i class="fa-solid fa-plus text-xs"></i>
                <span>Add Employee</span>
            </button>
            <button onclick="window.location.href='navbar.html'"
                    class="flex items-center space-x-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors shadow">
                <i class="fa-solid fa-chart-pie text-xs"></i> <span>Dashboard</span>
            </button>
        </div>
    </div>
    <div class="max-w-7xl mx-auto px-6 py-8">

        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Employee Directory</h1>
            <p class="text-slate-500 text-sm mt-1">All registered employees across departments</p>
        </div>

        <!-- Alert -->
        <div id="alertMessage" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-xl p-4 border border-slate-200 flex items-center space-x-4">
                <div class="bg-indigo-50 rounded-lg w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-users text-indigo-600"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-500 uppercase tracking-wide">Total Employees</p>
                    <p class="text-2xl font-bold text-slate-900" id="totalCount">—</p>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border border-slate-200 flex items-center space-x-4">
                <div class="bg-green-50 rounded-lg w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-circle-check text-green-600"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-500 uppercase tracking-wide">Active</p>
                    <p class="text-2xl font-bold text-slate-900" id="activeCount">—</p>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border border-slate-200 flex items-center space-x-4">
                <div class="bg-red-50 rounded-lg w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-circle-xmark text-red-500"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-500 uppercase tracking-wide">Inactive</p>
                    <p class="text-2xl font-bold text-slate-900" id="inactiveCount">—</p>
                </div>
            </div>
        </div>

        <!-- Employee Cards Grid -->
        <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            <div class="bg-white rounded-2xl p-6 border border-slate-200 animate-pulse">
                <div class="flex flex-col items-center space-y-3">
                    <div class="w-20 h-20 rounded-full bg-slate-200"></div>
                    <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                    <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">

            <!-- Modal Header -->
            <div class="bg-slate-900 px-6 py-4 flex items-center justify-between">
                <h2 class="text-white font-semibold text-base">Edit Employee</h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Profile Picture -->
            <div class="flex flex-col items-center pt-6 pb-4 bg-slate-50 border-b border-slate-100">
                <div class="relative mb-2">
                    <img id="editProfilePreview" src=""
                         class="w-24 h-24 rounded-full object-cover avatar-ring bg-slate-200">
                    <label for="editProfilePicture"
                           class="absolute bottom-0 right-0 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-8 h-8 flex items-center justify-center cursor-pointer shadow-lg transition-colors">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </label>
                </div>
                <input type="file" id="editProfilePicture" accept="image/*" class="hidden">
                <p class="text-xs text-slate-400">Click the camera to update photo</p>
            </div>

            <!-- Form -->
            <form id="editForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Full Name</label>
                        <input type="text" id="editName" required
                               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
                        <input type="email" id="editEmail" required
                               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Role</label>
                        <select id="editRoleDropdown" required
                                class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="">Role</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Department</label>
                        <select id="editDeptDropdown" required
                                class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="">Dept</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Designation</label>
                        <select id="editDesigDropdown" required
                                class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 cursor-pointer">
                            <option value="">Desig</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="editIsActive"
                           class="h-4 w-4 text-indigo-600 border-slate-300 rounded cursor-pointer">
                    <label for="editIsActive" class="text-sm font-medium text-slate-600 cursor-pointer">Active Account</label>
                </div>

                <div class="flex justify-end space-x-3 pt-2 border-t border-slate-100">
                    <button type="button" onclick="closeEditModal()"
                            class="px-4 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-5 py-2.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-colors">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadUsers();
            await loadDropdown('/roles', 'editRoleDropdown', 'id', 'roleName');
            await loadDropdown('/departments', 'editDeptDropdown', 'departmentId', 'departmentName');
            await loadDropdown('/designations', 'editDesigDropdown', 'id', 'designationName');
        });

        async function loadDropdown(endpoint, elementId, valueKey, textKey) {
            const dropdown = document.getElementById(elementId);
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`);
                if (!response.ok) throw new Error(`Failed to fetch ${endpoint}`);
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) return;
                data.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item[valueKey];
                    option.textContent = item[textKey];
                    dropdown.appendChild(option);
                });
            } catch (error) {
                console.error(`Dropdown error (${elementId}):`, error);
            }
        }

        async function loadUsers() {
            const grid = document.getElementById('cardsGrid');
            try {
                const response = await fetch(`${API_BASE_URL}/users`);
                if (!response.ok) throw new Error('Failed to fetch users');

                const users = await response.json();

                document.getElementById('totalCount').textContent = users.length;
                document.getElementById('activeCount').textContent = users.filter(u => u.isActive).length;
                document.getElementById('inactiveCount').textContent = users.filter(u => !u.isActive).length;

                if (!Array.isArray(users) || users.length === 0) {
                    grid.innerHTML = `
                                <div class="col-span-4 py-16 text-center text-slate-400">
                                    <i class="fa-solid fa-users text-4xl mb-3 block"></i>
                                    <p class="text-lg font-medium">No employees found</p>
                                    <p class="text-sm mt-1">Click "Add Employee" to get started</p>
                                </div>`;
                    return;
                }

                grid.innerHTML = users.map(u => {
                    const avatarSrc = (u.profilePicture && u.profilePicture.startsWith('data:'))
                        ? u.profilePicture
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=e0e7ff&color=4f46e5&size=128&bold=true`;

                    const statusColor = u.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600';
                    const statusDot = u.isActive ? 'bg-green-500' : 'bg-red-400';
                    const safeUser = JSON.stringify(u).replace(/'/g, "&#39;");

                    return `
                            <div class="bg-white rounded-2xl border border-slate-200 card-hover overflow-hidden">
                                <!-- Gradient band -->
                                <div class="h-16 bg-gradient-to-r from-indigo-600 to-violet-600 relative">
                                    <div class="absolute -bottom-10 left-1/2 -translate-x-1/2">
                                        <img src="${avatarSrc}"
                                             class="w-20 h-20 rounded-full object-cover avatar-ring bg-white"
                                             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=e0e7ff&color=4f46e5&size=128&bold=true'">
                                    </div>
                                </div>

                                <!-- Body -->
                                <div class="pt-12 pb-5 px-5 text-center">
                                    <h3 class="font-semibold text-slate-900 text-base truncate">${escapeHtml(u.name)}</h3>
                                    <p class="text-xs text-indigo-600 font-medium mt-0.5 truncate">${escapeHtml(u.designationName)}</p>
                                    <p class="text-xs text-slate-400 truncate mt-0.5">${escapeHtml(u.email)}</p>

                                    <!-- Info pills -->
                                    <div class="mt-3 flex flex-wrap justify-center gap-1.5">
                                        <span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-medium">
                                            <i class="fa-solid fa-building text-slate-400 mr-1"></i>${escapeHtml(u.departmentName)}
                                        </span>
                                        <span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium">
                                            <i class="fa-solid fa-shield-halved text-indigo-400 mr-1"></i>${escapeHtml(u.roleName)}
                                        </span>
                                    </div>

                                    <!-- Status -->
                                    <div class="mt-3 flex justify-center">
                                        <span class="inline-flex items-center space-x-1.5 px-3 py-1 rounded-full text-xs font-semibold ${statusColor}">
                                            <span class="w-1.5 h-1.5 rounded-full ${statusDot}"></span>
                                            <span>${u.isActive ? 'Active' : 'Inactive'}</span>
                                        </span>
                                    </div>
                                </div>

                                <!-- Actions -->
                                <div class="border-t border-slate-100 grid grid-cols-2 divide-x divide-slate-100">
                                    <button onclick='openEditModal(${safeUser})'
                                            class="py-2.5 text-xs font-medium text-indigo-600 hover:bg-indigo-50 transition-colors flex items-center justify-center space-x-1.5">
                                        <i class="fa-solid fa-pen text-xs"></i><span>Edit</span>
                                    </button>
                                    <button onclick="deleteUser(${u.id})"
                                            class="py-2.5 text-xs font-medium text-red-500 hover:bg-red-50 transition-colors flex items-center justify-center space-x-1.5">
                                        <i class="fa-solid fa-trash text-xs"></i><span>Delete</span>
                                    </button>
                                </div>
                            </div>`;
                }).join('');

            } catch (error) {
                grid.innerHTML = `
                            <div class="col-span-4 py-16 text-center text-red-500">
                                <i class="fa-solid fa-triangle-exclamation text-3xl mb-3 block"></i>
                                <p>Error loading employees: ${error.message}</p>
                            </div>`;
            }
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('editProfilePicture').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('editProfilePreview').src = e.target.result; };
            reader.readAsDataURL(file);
        });

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function openEditModal(user) {
            document.getElementById('editId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editIsActive').checked = user.isActive;
            document.getElementById('editRoleDropdown').value = user.roleId;
            document.getElementById('editDeptDropdown').value = user.departmentId;
            document.getElementById('editDesigDropdown').value = user.designationId;
            document.getElementById('editProfilePreview').src = (user.profilePicture && user.profilePicture.startsWith('data:'))
                ? user.profilePicture
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=e0e7ff&color=4f46e5&size=128&bold=true`;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const picFile = document.getElementById('editProfilePicture').files[0];
            const profilePicture = picFile
                ? await toBase64(picFile)
                : document.getElementById('editProfilePreview').src;

            const payload = {
                name: document.getElementById('editName').value.trim(),
                email: document.getElementById('editEmail').value.trim(),
                roleId: parseInt(document.getElementById('editRoleDropdown').value),
                departmentId: parseInt(document.getElementById('editDeptDropdown').value),
                designationId: parseInt(document.getElementById('editDesigDropdown').value),
                isActive: document.getElementById('editIsActive').checked,
                profilePicture: profilePicture
            };

            try {
                const response = await fetch(`${API_BASE_URL}/users/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    showAlert('Employee updated successfully.', 'success');
                    closeEditModal();
                    loadUsers();
                } else {
                    const errData = await response.json().catch(() => ({}));
                    showAlert(errData.message || 'Error updating employee.', 'error');
                }
            } catch (error) {
                showAlert('Server unreachable.', 'error');
            }
        });

        async function deleteUser(id) {
            if (!confirm('Remove this employee? This cannot be undone.')) return;
            try {
                const response = await fetch(`${API_BASE_URL}/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('Employee removed successfully.', 'success');
                    loadUsers();
                } else {
                    const errData = await response.json().catch(() => ({}));
                    showAlert(errData.message || 'Error deleting employee.', 'error');
                }
            } catch (error) {
                showAlert('Server unreachable.', 'error');
            }
        }

        function showAlert(msg, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700');
            alertDiv.classList.add(
                type === 'success' ? 'bg-green-50' : 'bg-red-50',
                type === 'success' ? 'text-green-700' : 'text-red-700'
            );
            alertDiv.textContent = msg;
            setTimeout(() => alertDiv.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
