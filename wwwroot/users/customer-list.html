<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers | ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-backdrop {
            background: rgba(15, 23, 42, 0.55);
        }

        .card-enter {
            animation: cardIn 0.15s ease-out;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-[#0b0f1a] sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold">
                    🏢
                </div>
                <span class="text-white font-semibold text-lg">ERP System</span>
            </div>
            <a href="navbar.html" id="dashboardLink" class="flex items-center gap-2 bg-[#171c2e] hover:bg-[#20263c] text-white text-sm font-medium px-4 py-2 rounded-lg transition border border-slate-700">
                <span>📊</span> Dashboard
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Customer Directory</h1>
            <p class="text-sm text-slate-500 mt-1">All registered customers</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white border border-slate-200 rounded-xl p-5 flex items-center gap-4">
                <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center text-lg">👥</div>
                <div>
                    <p class="text-xs font-medium text-slate-400 tracking-wide uppercase">Total Customers</p>
                    <p class="text-2xl font-bold text-slate-900" id="statTotal">0</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mb-6">
            <div class="flex-1 flex gap-2">
                <input id="searchIdInput"
                       type="number"
                       placeholder="Search by Customer ID…"
                       class="w-full sm:w-64 border border-slate-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       onkeydown="if(event.key==='Enter') searchById()" />
                <button onclick="searchById()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                    Search
                </button>
                <button onclick="clearSearch()" id="clearSearchBtn" class="hidden text-slate-600 hover:text-slate-900 text-sm font-medium px-3 py-2 rounded-lg transition">
                    Clear
                </button>
            </div>
        </div>

        <div id="loadingState" class="text-center py-16 text-slate-400">Loading customers…</div>

        <div id="errorState" class="hidden text-center py-16">
            <p class="text-red-600 font-medium mb-1">Couldn't load customers</p>
            <p class="text-sm text-slate-500" id="errorMessage"></p>
            <button onclick="loadAllCustomers()" class="mt-4 text-sm bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-700">Try again</button>
        </div>

        <div id="emptyState" class="hidden text-center py-16">
            <p class="text-slate-500 font-medium">No customers found</p>
            <p class="text-sm text-slate-400 mt-1">Try a different ID.</p>
        </div>

        <div id="cardGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

    </main>

    <div id="updateModal" class="hidden fixed inset-0 z-40 modal-backdrop flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <h2 class="text-lg font-semibold text-slate-900" id="updateModalTitle">Edit Customer</h2>
                <button onclick="closeUpdateModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
            </div>
            <form id="updateForm" class="px-6 py-5 space-y-4" onsubmit="submitUpdate(event)">
                <input type="hidden" id="editId" />
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Name <span class="text-red-500">*</span></label>
                    <input id="editName" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input id="editEmail" type="email" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
                    <input id="editPhone" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
                    <input id="editAddress" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">City</label>
                    <input id="editCity" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>

                <p id="updateError" class="hidden text-sm text-red-600"></p>

                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeUpdateModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition">Cancel</button>
                    <button type="submit" id="updateSubmitBtn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="hidden fixed inset-0 z-40 modal-backdrop flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">
            <div class="px-6 py-5">
                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center mb-3">
                    <span class="text-red-600 text-lg">!</span>
                </div>
                <h2 class="text-lg font-semibold text-slate-900 mb-1">Delete this customer?</h2>
                <p class="text-sm text-slate-500">
                    This will remove <span id="deleteCustomerName" class="font-medium text-slate-700"></span> from your records. This can't be undone.
                </p>
                <p id="deleteError" class="hidden text-sm text-red-600 mt-2"></p>
            </div>
            <div class="flex justify-end gap-2 px-6 py-4 border-t border-slate-100">
                <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition">Cancel</button>
                <button onclick="confirmDelete()" id="deleteConfirmBtn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition">Delete</button>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white text-sm px-4 py-3 rounded-lg shadow-lg z-50"></div>

    <script>
        // ---- Config ----
        const API_BASE = "/api/Customer";
        document.getElementById("dashboardLink").href = "navbar.html";

        let allCustomers = [];
        let deleteTargetId = null;

        // ---- Init ----
        document.addEventListener("DOMContentLoaded", loadAllCustomers);

        // ---- Load all customers ----
        async function loadAllCustomers() {
            showState("loading");
            try {
                const res = await fetch(API_BASE);
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                allCustomers = await res.json();
                renderCustomers(allCustomers);
                updateStats(allCustomers);
            } catch (err) {
                showError(err.message);
            }
        }

        // ---- Search by ID ----
        async function searchById() {
            const idValue = document.getElementById("searchIdInput").value.trim();
            if (!idValue) {
                loadAllCustomers();
                return;
            }

            showState("loading");
            document.getElementById("clearSearchBtn").classList.remove("hidden");

            try {
                const res = await fetch(`${API_BASE}/${idValue}`);
                if (res.status === 404) {
                    renderCustomers([]);
                    updateStats([]);
                    return;
                }
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                const customer = await res.json();
                allCustomers = [customer];
                renderCustomers([customer]);
                updateStats([customer]);
            } catch (err) {
                showError(err.message);
            }
        }

        function clearSearch() {
            document.getElementById("searchIdInput").value = "";
            document.getElementById("clearSearchBtn").classList.add("hidden");
            loadAllCustomers();
        }

        // ---- Stats ----
        function updateStats(customers) {
            document.getElementById("statTotal").textContent = customers.length;
        }

        // ---- Render ----
        function renderCustomers(customers) {
            const grid = document.getElementById("cardGrid");

            if (!customers || customers.length === 0) {
                showState("empty");
                return;
            }

            grid.innerHTML = customers.map(c => `
          <div class="card-enter bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-md transition">
            <div class="h-16 bg-gradient-to-r from-indigo-600 to-purple-600"></div>
            <div class="px-5 pb-5 -mt-8">
              <div class="w-16 h-16 rounded-full bg-indigo-100 border-4 border-white flex items-center justify-center text-indigo-700 font-bold text-lg mx-auto shadow-sm">
                ${escapeHtml(getInitials(c.name))}
              </div>
              <div class="text-center mt-3">
                <h3 class="font-semibold text-slate-900">${escapeHtml(c.name || "—")}</h3>
                <p class="text-xs text-indigo-600 font-medium mt-0.5">${escapeHtml(c.city || "No city on file")}</p>
                <p class="text-sm text-slate-500 mt-1 truncate">${escapeHtml(c.email || "No email")}</p>
              </div>

              <div class="flex flex-wrap justify-center gap-2 mt-3">
                <span class="text-xs bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full">📞 ${escapeHtml(c.phone || "—")}</span>
                <span class="text-xs bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full font-mono">#${c.id}</span>
              </div>

              <div class="flex gap-2 mt-4 pt-4 border-t border-slate-100">
                <button onclick="openUpdateModal(${c.id})" class="flex-1 flex items-center justify-center gap-1 text-sm font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg py-1.5 transition">
                  ✏️ Edit
                </button>
                <button onclick="openDeleteModal(${c.id})" class="flex-1 flex items-center justify-center gap-1 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg py-1.5 transition">
                  🗑️ Delete
                </button>
              </div>
            </div>
          </div>
        `).join("");

            showState("grid");
        }

        // ---- Update modal ----
        function openUpdateModal(id) {
            const customer = allCustomers.find(c => c.id === id);
            if (!customer) {
                showToast("Couldn't find that customer — try refreshing");
                return;
            }

            document.getElementById("updateModalTitle").textContent = `Edit Customer #${customer.id}`;
            document.getElementById("editId").value = customer.id;
            document.getElementById("editName").value = customer.name || "";
            document.getElementById("editEmail").value = customer.email || "";
            document.getElementById("editPhone").value = customer.phone || "";
            document.getElementById("editAddress").value = customer.address || "";
            document.getElementById("editCity").value = customer.city || "";
            document.getElementById("updateError").classList.add("hidden");
            document.getElementById("updateModal").classList.remove("hidden");
        }

        function closeUpdateModal() {
            document.getElementById("updateModal").classList.add("hidden");
        }

        async function submitUpdate(event) {
            event.preventDefault();
            const id = document.getElementById("editId").value;
            const payload = {
                id: Number(id),
                name: document.getElementById("editName").value.trim(),
                email: document.getElementById("editEmail").value.trim(),
                phone: document.getElementById("editPhone").value.trim(),
                address: document.getElementById("editAddress").value.trim(),
                city: document.getElementById("editCity").value.trim()
            };

            const btn = document.getElementById("updateSubmitBtn");
            btn.disabled = true;
            btn.textContent = "Saving…";

            try {
                const res = await fetch(`${API_BASE}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(`Server returned ${res.status}`);

                closeUpdateModal();
                showToast("Customer updated");
                loadAllCustomers();
            } catch (err) {
                const errEl = document.getElementById("updateError");
                errEl.textContent = `Update failed: ${err.message}`;
                errEl.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.textContent = "Save changes";
            }
        }

        // ---- Delete modal ----
        function openDeleteModal(id) {
            const customer = allCustomers.find(c => c.id === id);
            deleteTargetId = id;
            document.getElementById("deleteCustomerName").textContent = customer ? customer.name : `#${id}`;
            document.getElementById("deleteError").classList.add("hidden");
            document.getElementById("deleteModal").classList.remove("hidden");
        }

        function closeDeleteModal() {
            deleteTargetId = null;
            document.getElementById("deleteModal").classList.add("hidden");
        }

        async function confirmDelete() {
            if (!deleteTargetId) return;

            const btn = document.getElementById("deleteConfirmBtn");
            btn.disabled = true;
            btn.textContent = "Deleting…";

            try {
                const res = await fetch(`${API_BASE}/${deleteTargetId}`, { method: "DELETE" });
                if (!res.ok) throw new Error(`Server returned ${res.status}`);

                closeDeleteModal();
                showToast("Customer deleted");
                loadAllCustomers();
            } catch (err) {
                const errEl = document.getElementById("deleteError");
                errEl.textContent = `Delete failed: ${err.message}`;
                errEl.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.textContent = "Delete";
            }
        }

        // ---- Helpers ----
        function showState(state) {
            document.getElementById("loadingState").classList.toggle("hidden", state !== "loading");
            document.getElementById("errorState").classList.toggle("hidden", state !== "error");
            document.getElementById("emptyState").classList.toggle("hidden", state !== "empty");
            document.getElementById("cardGrid").classList.toggle("hidden", state !== "grid");
        }

        function showError(message) {
            document.getElementById("errorMessage").textContent = message;
            showState("error");
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.remove("hidden");
            setTimeout(() => toast.classList.add("hidden"), 2500);
        }

        function getInitials(name) {
            if (!name) return "?";
            return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }
    </script>

</body>
</html>
